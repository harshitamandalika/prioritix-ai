name: Prioritix AI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  backend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run backend tests
        run: |
          pytest backend/tests

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build backend docker image
        run: docker build -t prioritix-backend -f backend/Dockerfile .

      - name: Build frontend docker image
        run: docker build -t prioritix-frontend -f frontend/Dockerfile .