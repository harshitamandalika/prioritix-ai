version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: prioritix-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/prioritix.db:/app/backend/prioritix.db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: prioritix-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped